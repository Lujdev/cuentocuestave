[tool.uv.workspace]
members = [
    "packages/domain",
    "packages/application",
    "packages/infrastructure",
    "packages/ml",
    "apps/api",
    "apps/workers",
]

[tool.uv]
dev-dependencies = [
    "pytest>=8.3",
    "pytest-asyncio>=0.24",
    "pytest-cov>=6.0",
    "pytest-benchmark>=5.0",
    "httpx>=0.28",
    "vcr-py>=6.0",
    "factory-boy>=3.3",
    "mypy>=1.13",
    "ruff>=0.8",
    "pre-commit>=4.0",
]

[tool.ruff]
target-version = "py312"
line-length = 100
src = ["packages", "apps"]

[tool.ruff.lint]
select = [
    "E", "W",    # pycodestyle
    "F",          # pyflakes
    "I",          # isort
    "N",          # pep8-naming
    "UP",         # pyupgrade
    "B",          # flake8-bugbear
    "SIM",        # flake8-simplify
    "TCH",        # flake8-type-checking
    "ANN",        # flake8-annotations
    "RUF",        # ruff-specific
]
ignore = ["ANN101", "ANN102", "ANN401"]

[tool.ruff.lint.isort]
known-first-party = [
    "cuantocuestave_domain",
    "cuantocuestave_application",
    "cuantocuestave_infra",
    "cuantocuestave_ml",
    "cuantocuestave_api",
    "cuantocuestave_workers",
]

[tool.mypy]
python_version = "3.12"
strict = true
ignore_missing_imports = true
warn_return_any = true
warn_unused_configs = true
plugins = ["pydantic.mypy"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["packages", "apps"]
addopts = "--cov --cov-report=term-missing"

[tool.coverage.run]
source = ["packages", "apps"]
omit = ["*/tests/*", "*/migrations/*"]
