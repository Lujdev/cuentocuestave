services:
  postgres:
    image: pgvector/pgvector:pg18
    environment:
      POSTGRES_DB: cuantocuestave_dev
      POSTGRES_USER: cuantocuestave
      POSTGRES_PASSWORD: cuantocuestave_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cuantocuestave -d cuantocuestave_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
