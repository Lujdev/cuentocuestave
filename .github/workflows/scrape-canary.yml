name: Scrape Canary

on:
  schedule:
    - cron: "0 10 * * *"  # 06:00 VET (UTC-4)
  workflow_dispatch:

jobs:
  canary:
    name: Daily scrape health check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - name: Install
        run: uv sync

      - name: Run Plaza's canary scrape
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DATABASE_URL_SYNC: ${{ secrets.DATABASE_URL_SYNC }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          ADMIN_ALLOWED_EMAIL: ${{ secrets.ADMIN_ALLOWED_EMAIL }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          ENVIRONMENT: canary
        run: |
          uv run python -c "
          import asyncio
          from cuantocuestave_infra.scrapers.plazas import PlazasScraper
          async def main():
              scraper = PlazasScraper()
              result = await scraper.scrape()
              print(f'Items scraped: {len(result.listings)}')
              print(f'Errors: {result.errors}')
              assert len(result.errors) == 0, f'Scrape errors: {result.errors}'
              assert len(result.listings) > 10, f'Too few items: {len(result.listings)}'
          asyncio.run(main())
          "

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 Scrape canary failed — ${new Date().toISOString().split('T')[0]}`,
              body: `Daily scrape canary failed. Check the [workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}).`,
              labels: ['scraping', 'incident'],
            })
