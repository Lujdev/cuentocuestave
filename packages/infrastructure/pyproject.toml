[project]
name = "cuantocuestave-infrastructure"
version = "0.1.0"
description = "Infrastructure layer: DB, scrapers, LLM, embeddings, cache"
requires-python = ">=3.12"
dependencies = [
    "cuantocuestave-domain",
    "cuantocuestave-application",
    "sqlalchemy[asyncio]>=2.0",
    "alembic>=1.14",
    "psycopg[binary,pool]>=3.2",
    "pgvector>=0.3",
    "redis[hiredis]>=5.2",
    "scrapling[fetchers]==0.4.7",
    "pydantic-settings>=2.7",
    "structlog>=25.0",
    "openai>=1.60",
    "sentence-transformers>=3.4",
    "beautifulsoup4>=4.12",
    "httpx>=0.28",
    "tenacity>=9.0",
    "sentry-sdk[fastapi]>=2.20",
]

[tool.uv.sources]
cuantocuestave-domain = { workspace = true }
cuantocuestave-application = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/cuantocuestave_infra"]
