[project]
name = "cuantocuestave-domain"
version = "0.1.0"
description = "Domain layer: entities, value objects, ports, services"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.10",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/cuantocuestave_domain"]
